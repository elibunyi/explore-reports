<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCC Summary</title>
<style>

:root {
  --navy: #1B3A5C;
  --navy-light: #2A5080;
  --accent: #E8913A;
  --accent-light: #FFF3E6;
  --green: #2E8B57;
  --green-light: #E8F5EE;
  --red: #C0392B;
  --red-light: #FDEDEB;
  --yellow: #F39C12;
  --yellow-light: #FEF9E7;
  --blue-light: #EBF5FB;
  --gray-bg: #F4F6F8;
  --gray-border: #D5D8DC;
  --text: #2C3E50;
  --text-light: #5D6D7E;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--gray-bg); color: var(--text); line-height: 1.6; }
.header { background: linear-gradient(135deg, var(--navy), var(--navy-light)); color: #fff; padding: 40px 0; }
.header-inner { max-width: 1100px; margin: 0 auto; padding: 0 30px; }
.header h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
.header .subtitle { font-size: 15px; opacity: 0.85; margin-bottom: 16px; }
.header-meta { display: flex; flex-wrap: wrap; gap: 24px; font-size: 13px; opacity: 0.8; }
.header-meta span { display: flex; align-items: center; gap: 6px; }
.container { max-width: 1100px; margin: 0 auto; padding: 30px; }
.card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 30px; margin-bottom: 24px; }
.card h2 { color: var(--navy); font-size: 20px; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 2px solid var(--navy); }
.card h3 { color: var(--navy-light); font-size: 16px; margin: 20px 0 10px 0; }
.card h4 { color: var(--text); font-size: 14px; margin: 14px 0 8px 0; font-weight: 600; }
.tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 6px; }
.tag-p1 { background: var(--red-light); color: var(--red); }
.tag-critical { background: var(--red-light); color: var(--red); }
.tag-p2 { background: var(--yellow-light); color: #B7950B; }
.tag-high { background: var(--yellow-light); color: #B7950B; }
.tag-p3 { background: var(--blue-light); color: #2471A3; }
.tag-medium { background: var(--blue-light); color: #2471A3; }
.tag-low { background: var(--green-light); color: var(--green); }
.tag-new { background: var(--green-light); color: var(--green); }
.tag-keep { background: var(--blue-light); color: #2471A3; }
.tag-remove { background: var(--red-light); color: var(--red); }
.tag-exact { background: #E8DAEF; color: #6C3483; }
.tag-phrase { background: #D5F5E3; color: #1E8449; }
.tag-brand { background: var(--accent-light); color: #B7700A; }
.tag-geo { background: #D6EAF8; color: #21618C; }
.tag-pass { background: var(--green-light); color: var(--green); }
.tag-fail { background: var(--red-light); color: var(--red); }
.tag-urgent { background: var(--red-light); color: var(--red); }
.tag-healthy { background: var(--green-light); color: var(--green); }
.tag-moderate { background: var(--blue-light); color: #2471A3; }

.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin: 16px 0; }
.info-item { background: var(--gray-bg); padding: 14px; border-radius: 8px; text-align: center; }
.info-item .label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.info-item .value { font-size: 22px; font-weight: 700; color: var(--navy); margin-top: 2px; }
.info-item .sub { font-size: 11px; color: var(--text-light); }

.warning-box { background: var(--red-light); border-left: 4px solid var(--red); padding: 14px 18px; border-radius: 0 8px 8px 0; margin: 12px 0; font-size: 14px; }
.note-box { background: var(--yellow-light); border-left: 4px solid var(--yellow); padding: 14px 18px; border-radius: 0 8px 8px 0; margin: 12px 0; font-size: 14px; }
.success-box { background: var(--green-light); border-left: 4px solid var(--green); padding: 14px 18px; border-radius: 0 8px 8px 0; margin: 12px 0; font-size: 14px; }
.info-box { background: var(--blue-light); border-left: 4px solid #2980B9; padding: 14px 18px; border-radius: 0 8px 8px 0; margin: 12px 0; font-size: 14px; }

table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
th { background: var(--navy); color: #fff; padding: 10px 12px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; }
td { padding: 9px 12px; border-bottom: 1px solid #EEE; }
tr:hover { background: #F8F9FA; }
tr.flagged { background: var(--red-light); }
tr.flagged:hover { background: #F5C6CB; }

.copy-box { background: #F8F9FA; border: 1px solid var(--gray-border); border-radius: 6px; padding: 12px 16px; font-family: 'Courier New', monospace; font-size: 13px; user-select: all; -webkit-user-select: all; margin: 10px 0; white-space: pre-wrap; word-break: break-all; cursor: pointer; position: relative; }
.copy-box:hover { border-color: var(--navy); background: #F0F3F6; }
.copy-box::after { content: 'Click to select all'; position: absolute; top: 4px; right: 8px; font-size: 10px; color: var(--text-light); font-family: 'Segoe UI', sans-serif; }

.bulk-paste { background: var(--accent-light); border: 2px dashed var(--accent); border-radius: 8px; padding: 18px 20px; font-family: 'Courier New', monospace; font-size: 13px; user-select: all; -webkit-user-select: all; margin: 14px 0; white-space: pre-wrap; cursor: pointer; position: relative; line-height: 1.8; }
.bulk-paste::before { content: 'BULK PASTE \2014 Click to select all'; display: block; font-family: 'Segoe UI', sans-serif; font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

.checklist { list-style: none; padding: 0; }
.checklist li { padding: 8px 0; border-bottom: 1px solid #EEE; font-size: 14px; display: flex; align-items: flex-start; gap: 10px; }
.checklist li:last-child { border-bottom: none; }
.check-pass { color: var(--green); font-size: 18px; flex-shrink: 0; }
.check-fail { color: var(--red); font-size: 18px; flex-shrink: 0; }

.section-divider { text-align: center; margin: 40px 0 30px 0; font-size: 13px; color: var(--text-light); text-transform: uppercase; letter-spacing: 2px; position: relative; }
.section-divider::before, .section-divider::after { content: ''; position: absolute; top: 50%; width: 30%; height: 1px; background: var(--gray-border); }
.section-divider::before { left: 0; }
.section-divider::after { right: 0; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

.finding-item { margin-bottom: 16px; padding: 12px 16px; border-radius: 8px; }
.finding-critical { background: var(--red-light); border-left: 4px solid var(--red); }
.finding-high { background: var(--yellow-light); border-left: 4px solid var(--yellow); }
.finding-medium { background: var(--blue-light); border-left: 4px solid #2980B9; }
.finding-low { background: var(--green-light); border-left: 4px solid var(--green); }
.finding-item strong { display: block; margin-bottom: 4px; }
.finding-detail { font-size: 13px; color: var(--text-light); margin-top: 4px; padding-left: 16px; }

</style>
</head>
<body>
<div class="header">
<div class="header-inner">
<h1>MCC Summary</h1>
<div class="subtitle">Google Ads Audit &mdash; 2026-03-20</div>
<div class="header-meta">
<span><strong>Date:</strong> 2026-03-20</span>
<span><strong>Prepared by:</strong> Eli Bunyi / Claude Opus 4.6</span>
</div>
</div>
</div>
<div class="container">
<div class="card">
<h2>Audit Summary</h2>
<div class="info-grid">
<div class="info-item">
<div class="label">Accounts Audited</div>
<div class="value">30</div>
</div>
<div class="info-item">
<div class="label">Accounts Failed</div>
<div class="value">0</div>
</div>
</div>
</div>
</div>
</body>
</html>
